name: Domino Bot

on:
  workflow_dispatch:
    inputs:
      phone:
        required: true
      password:
        required: true
      score:
        default: '50'
      mise:
        default: '200'
      joueurs:
        default: '2'

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install puppeteer-real-browser
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq xvfb
      - name: Lancer le bot
        env:
          PHONE: ${{ github.event.inputs.phone }}
          PASSWORD: ${{ github.event.inputs.password }}
          SCORE: ${{ github.event.inputs.score }}
          MISE: ${{ github.event.inputs.mise }}
          JOUEURS: ${{ github.event.inputs.joueurs }}
          DISPLAY: ':99'
        run: |
          Xvfb :99 -screen 0 1280x720x24 &
          sleep 2
          node goodloka-bot.js
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: game-screenshots
          path: screenshots/
