name: Domino Bot avec VNC

on:
  workflow_dispatch:
    inputs:
      phone:
        description: 'Numéro de téléphone (indicatif + chiffres)'
        required: true
      password:
        description: 'Mot de passe GoodLoka'
        required: true
      score:
        description: 'Score cible (ex: 50)'
        default: '50'
        required: false
      mise:
        description: 'Mise (ex: 200)'
        default: '200'
        required: false
      joueurs:
        description: 'Nombre de joueurs (2, 3 ou 4)'
        default: '2'
        required: false

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installer puppeteer-real-browser
        run: npm install puppeteer-real-browser

      - name: Installer Xvfb et x11vnc
        run: sudo apt-get update -qq && sudo apt-get install -y -qq xvfb x11vnc

      - name: Démarrer Xvfb et VNC
        run: |
          Xvfb :99 -screen 0 1280x720x24 &
          sleep 2
          x11vnc -display :99 -forever -nopw -quiet -listen 0.0.0.0 &
          sleep 2
          echo "✅ VNC démarré sur le port 5900"

      - name: Installer ngrok
        run: |
          curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt-get update -qq && sudo apt-get install -y -qq ngrok

      - name: Exposer VNC via ngrok
        env:
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
        run: |
          ngrok config add-authtoken $NGROK_AUTH_TOKEN
          ngrok tcp 5900 --log=stdout &
          sleep 5
          echo ""
          echo "🔗 URL VNC :"
          curl -s http://127.0.0.1:4040/api/tunnels | grep -o '"public_url":"tcp://[^"]*"' | head -1
          echo ""

      - name: Lancer le bot
        env:
          PHONE: ${{ github.event.inputs.phone }}
          PASSWORD: ${{ github.event.inputs.password }}
          SCORE: ${{ github.event.inputs.score }}
          MISE: ${{ github.event.inputs.mise }}
          JOUEURS: ${{ github.event.inputs.joueurs }}
          DISPLAY: ':99'
        run: |
          sleep 3
          node goodloka-bot.js
