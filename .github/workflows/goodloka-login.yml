name: GoodLoka Join Game

on:
  workflow_dispatch:
    inputs:
      phone:
        description: 'Numéro de téléphone'
        required: true
      password:
        description: 'Mot de passe'
        required: true
      score:
        description: 'Score (ex: 50) – laisser vide pour ignorer'
        required: false
      mise:
        description: 'Mise en MGA (ex: 500) – laisser vide pour ignorer'
        required: false
      condition:
        description: 'Condition (ex: < 6) – laisser vide pour ignorer'
        required: false

jobs:
  join:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install puppeteer-real-browser
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq xvfb ffmpeg
      - name: Exécuter la recherche
        env:
          PHONE: ${{ github.event.inputs.phone }}
          PASSWORD: ${{ github.event.inputs.password }}
          SCORE: ${{ github.event.inputs.score }}
          MISE: ${{ github.event.inputs.mise }}
          CONDITION: ${{ github.event.inputs.condition }}
          DISPLAY: ':99'
        run: |
          Xvfb :99 -screen 0 1280x720x24 &
          sleep 2
          node goodloka-join-game.js
      - uses: actions/upload-artifact@v4
        with:
          name: join-game-artifacts
          path: |
            screenshots/
            videos/
