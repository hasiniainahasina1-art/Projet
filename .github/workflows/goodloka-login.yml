name: Domino Bot

on:
  workflow_dispatch:
    inputs:
      phone:
        description: 'Numéro de téléphone (indicatif + chiffres)'
        required: true
      password:
        description: 'Mot de passe GoodLoka'
        required: true
      score:
        description: 'Score cible (ex: 50)'
        default: '50'
        required: false
      mise:
        description: 'Mise (ex: 200)'
        default: '200'
        required: false
      joueurs:
        description: 'Nombre de joueurs (2, 3 ou 4)'
        default: '2'
        required: false

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installer puppeteer-real-browser
        run: npm install puppeteer-real-browser

      - name: Installer Xvfb et ffmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y -qq xvfb ffmpeg

      - name: Lancer le bot
        env:
          PHONE: ${{ github.event.inputs.phone }}
          PASSWORD: ${{ github.event.inputs.password }}
          SCORE: ${{ github.event.inputs.score }}
          MISE: ${{ github.event.inputs.mise }}
          JOUEURS: ${{ github.event.inputs.joueurs }}
          DISPLAY: ':99'
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 3
          node goodloka-bot.js

      - name: Uploader les artefacts (captures + vidéo)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: game-recordings
          path: |
            screenshots/
            recordings/
