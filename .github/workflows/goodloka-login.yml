name: Inspect All Games

on:
  workflow_dispatch:
    inputs:
      phone:
        description: 'Numéro de téléphone'
        required: true
      password:
        description: 'Mot de passe'
        required: true

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install puppeteer-real-browser
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq xvfb ffmpeg
      - name: Exécuter
        env:
          PHONE: ${{ github.event.inputs.phone }}
          PASSWORD: ${{ github.event.inputs.password }}
          DISPLAY: ':99'
        run: |
          Xvfb :99 -screen 0 1280x720x24 &
          sleep 2
          node goodloka-inspect-all-games.js
      - uses: actions/upload-artifact@v4
        with:
          name: all-games-info
          path: |
            screenshots/
            videos/
