name: GoodLoka Auto Login

on:
  workflow_dispatch:
    inputs:
      phone:
        description: 'Numéro de téléphone'
        required: true
      password:
        description: 'Mot de passe'
        required: true
      userId:
        description: 'ID utilisateur (optionnel)'
        required: false

jobs:
  login:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install puppeteer-real-browser @octokit/rest
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq xvfb ffmpeg
      - name: Exécuter le login
        env:
          PHONE: ${{ github.event.inputs.phone }}
          PASSWORD: ${{ github.event.inputs.password }}
          USER_ID: ${{ github.event.inputs.userId }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
          GH_REPO: ${{ secrets.GH_REPO }}
          JP_PROXY_LIST: ${{ secrets.JP_PROXY_LIST }}
          CRYPTO_SECRET: ${{ secrets.CRYPTO_SECRET }}
          DISPLAY: ':99'
        run: |
          Xvfb :99 -screen 0 1280x720x24 &
          sleep 2
          node goodloka-login.js
      - name: Upload vidéo
        uses: actions/upload-artifact@v4
        with:
          name: goodloka-login-video
          path: videos/
