name: Domino Bot avec VNC

on:
  workflow_dispatch:
    inputs:
      phone:
        description: 'Numéro de téléphone (indicatif + chiffres)'
        required: true
      password:
        description: 'Mot de passe GoodLoka'
        required: true
      score:
        description: 'Score cible (ex: 50)'
        default: '50'
        required: false
      mise:
        description: 'Mise (ex: 200)'
        default: '200'
        required: false
      joueurs:
        description: 'Nombre de joueurs (2, 3 ou 4)'
        default: '2'
        required: false

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installer puppeteer-real-browser
        run: npm install puppeteer-real-browser

      - name: Installer Xvfb et x11vnc
        run: sudo apt-get update -qq && sudo apt-get install -y -qq xvfb x11vnc

      - name: Démarrer Xvfb et VNC
        run: |
          Xvfb :99 -screen 0 1280x720x24 &
          sleep 2
          x11vnc -display :99 -forever -nopw -quiet -listen 0.0.0.0 &
          sleep 2
          echo "✅ VNC démarré sur le port 5900"

      - name: Installer bore
        run: |
          curl -sL https://github.com/ekzhang/bore/releases/download/v0.5.2/bore-v0.5.2-x86_64-unknown-linux-musl.tar.gz -o bore.tar.gz
          tar -xzf bore.tar.gz
          chmod +x bore
          sudo mv bore /usr/local/bin/
          echo "✅ bore installé"

      - name: Exposer VNC via bore
        run: |
          echo "⏳ Démarrage du tunnel bore..."
          bore local 5900 --to bore.pub > /tmp/bore.txt 2>&1 &
          BORE_PID=$!
          
          # Attendre que le tunnel soit prêt
          sleep 5
          
          echo ""
          echo "=============================================="
          echo "📋 Sortie de bore :"
          cat /tmp/bore.txt
          echo ""
          
          # Extraire l'adresse et le port
          BORE_OUTPUT=$(cat /tmp/bore.txt)
          BORE_HOST=$(echo "$BORE_OUTPUT" | grep -oE 'bore\.pub' | head -1)
          BORE_PORT=$(echo "$BORE_OUTPUT" | grep -oE 'listening on [0-9]+' | grep -oE '[0-9]+' | head -1)
          
          if [ -n "$BORE_PORT" ]; then
            echo ""
            echo "✅ Tunnel VNC actif !"
            echo "🔗 Adresse : bore.pub"
            echo "🔌 Port    : ${BORE_PORT}"
            echo ""
            echo "📋 Pour te connecter avec VNC Viewer :"
            echo "   Adresse : bore.pub"
            echo "   Port    : ${BORE_PORT}"
          else
            echo "⚠️ Port non trouvé dans la sortie."
          fi
          echo "=============================================="
          echo ""

      - name: Lancer le bot
        env:
          PHONE: ${{ github.event.inputs.phone }}
          PASSWORD: ${{ github.event.inputs.password }}
          SCORE: ${{ github.event.inputs.score }}
          MISE: ${{ github.event.inputs.mise }}
          JOUEURS: ${{ github.event.inputs.joueurs }}
          DISPLAY: ':99'
        run: |
          sleep 3
          node goodloka-bot.js
