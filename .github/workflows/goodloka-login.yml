name: Inspect Create Game Options

on:
  workflow_dispatch:
    inputs:
      phone:
        description: 'Numéro de téléphone'
        required: true
      password:
        description: 'Mot de passe'
        required: true

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install puppeteer-real-browser
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq xvfb
      - name: Exécuter l'inspection
        env:
          PHONE: ${{ github.event.inputs.phone }}
          PASSWORD: ${{ github.event.inputs.password }}
          DISPLAY: ':99'
        run: |
          Xvfb :99 -screen 0 1280x720x24 &
          sleep 2
          node goodloka-create-game.js
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: create-game-screenshots
          path: screenshots/
