name: Domino Bot avec VNC

on:
  workflow_dispatch:
    inputs:
      phone:
        description: 'Numéro de téléphone (indicatif + chiffres)'
        required: true
      password:
        description: 'Mot de passe GoodLoka'
        required: true
      score:
        description: 'Score cible (ex: 50)'
        default: '50'
        required: false
      mise:
        description: 'Mise (ex: 200)'
        default: '200'
        required: false
      joueurs:
        description: 'Nombre de joueurs (2, 3 ou 4)'
        default: '2'
        required: false

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installer puppeteer-real-browser
        run: npm install puppeteer-real-browser

      - name: Installer Xvfb et x11vnc
        run: sudo apt-get update -qq && sudo apt-get install -y -qq xvfb x11vnc

      - name: Démarrer Xvfb et VNC
        run: |
          Xvfb :99 -screen 0 1280x720x24 &
          sleep 2
          x11vnc -display :99 -forever -nopw -quiet -listen 0.0.0.0 &
          sleep 2
          echo "✅ VNC démarré sur le port 5900"

      - name: Exposer VNC via pinggy
        run: |
          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -p 443 -R0:localhost:5900 a.pinggy.io > /tmp/pinggy.txt 2>&1 &
          echo "⏳ Attente du tunnel pinggy..."
          
          for i in {1..30}; do
            if grep -q "pinggy" /tmp/pinggy.txt 2>/dev/null; then
              break
            fi
            sleep 1
          done
          
          # Extraire l'URL (pinggy.link ou pinggy-free.link)
          PINGGY_URL=$(grep -oE '[a-zA-Z0-9-]+\.pinggy[a-zA-Z0-9.-]*\.link' /tmp/pinggy.txt | head -1)
          
          echo ""
          echo "=============================================="
          if [ -n "$PINGGY_URL" ]; then
            echo "✅ Tunnel VNC actif !"
            echo ""
            echo "🔗 Adresse : ${PINGGY_URL}"
            echo "🔌 Port    : 443"
            echo ""
            echo "📋 Pour te connecter avec VNC Viewer :"
            echo "   Adresse : ${PINGGY_URL}"
            echo "   Port    : 443"
          else
            echo "⚠️ URL non trouvée, contenu brut :"
            cat /tmp/pinggy.txt
          fi
          echo "=============================================="
          echo ""

      - name: Lancer le bot
        env:
          PHONE: ${{ github.event.inputs.phone }}
          PASSWORD: ${{ github.event.inputs.password }}
          SCORE: ${{ github.event.inputs.score }}
          MISE: ${{ github.event.inputs.mise }}
          JOUEURS: ${{ github.event.inputs.joueurs }}
          DISPLAY: ':99'
        run: |
          sleep 3
          node goodloka-bot.js
