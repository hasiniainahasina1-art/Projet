<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bot Dashboard Pro</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0b1b3a, #142a52);
      color: white;
    }

    .container { padding: 20px; }

    .card {
      background: rgba(255,255,255,0.08);
      padding: 20px;
      border-radius: 16px;
      margin-bottom: 15px;
      backdrop-filter: blur(10px);
    }

    h1 { color: #ffd700; font-size: 22px; }

    input, select {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      outline: none;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(90deg, #ffd700, #ffb300);
      font-weight: bold;
      cursor: pointer;
    }

    button:active { transform: scale(0.98); }

    .status {
      margin-top: 10px;
      color: #00ff99;
      font-size: 13px;
    }

    .log {
      background: rgba(0,0,0,0.4);
      padding: 10px;
      border-radius: 10px;
      font-size: 12px;
      height: 180px;
      overflow-y: auto;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="card">
    <h1>🚀 BOT DASHBOARD PRO</h1>
    <p>Login + Debug + RAW Response</p>
  </div>

  <div class="card">
    <input id="email" placeholder="Email" />
    <input id="password" type="password" placeholder="Mot de passe" />

    <select id="platform">
      <option value="tronpick">TronPick</option>
      <option value="litepick">LitePick</option>
      <option value="dogepick">DogePick</option>
      <option value="solpick">SolPick</option>
      <option value="binpick">BinPick</option>
    </select>

    <button onclick="startLogin()">🚀 START LOGIN</button>

    <div class="status" id="status">En attente...</div>
  </div>

  <div class="card">
    <h3>📡 LOGS (RAW DEBUG)</h3>
    <div class="log" id="log"></div>
  </div>

</div>

<script>

function log(msg) {
  const box = document.getElementById('log');
  box.innerText += msg + "\n";
  box.scrollTop = box.scrollHeight;
}

async function startLogin() {

  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const platform = document.getElementById('platform').value;

  document.getElementById('status').innerText = "Connexion...";
  log("🚀 START LOGIN");

  try {

    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password, platform })
    });

    // 🔥 RAW RESPONSE (IMPORTANT)
    const text = await res.text();

    log("🔴 RAW RESPONSE:");
    log(text);

    let data;

    try {
      data = JSON.parse(text);
      log("🟢 JSON OK");
      log(JSON.stringify(data, null, 2));
    } catch (err) {
      log("❌ RESPONSE NOT JSON");
      document.getElementById('status').innerText = "Erreur serveur";
      return;
    }

    if (data.success) {
      document.getElementById('status').innerText =
        data.reused ? "♻️ Session réutilisée" : "✅ Login réussi";
    } else {
      document.getElementById('status').innerText = "❌ Échec login";
    }

  } catch (err) {
    log("❌ ERROR: " + err.message);
    document.getElementById('status').innerText = "Erreur réseau";
  }
}

</script>

</body>
</html>
